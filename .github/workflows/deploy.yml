name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Permette di triggerare manualmente dal tab Actions
  workflow_dispatch:

# Permessi necessari per GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploy paralleli: non cancella quello in corso, aspetta
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        # Rimuove il package-lock.json generato su macOS: evita il bug
        # "@rollup/rollup-linux-x64-gnu not found" causato dal mismatch
        # tra binari nativi Rollup per piattaforma diversa nel lockfile.
        run: |
          rm -f package-lock.json
          npm install

      - name: Build
        # Passa la base URL dinamica (es. /repo-name/) da GitHub Pages
        run: npm run build -- --base="${{ steps.pages.outputs.base_path }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
